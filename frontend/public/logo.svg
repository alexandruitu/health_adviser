<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="32" x2="64" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="64" height="64" rx="16" fill="url(#bg)" opacity="0.3" filter="blur(4)"/>
  <!-- Heart shape (small, top-left area) -->
  <path d="M22 22c-2.5-2.5-6.5-2.5-9 0s-2.5 6.5 0 9l13 13 13-13c2.5-2.5 2.5-6.5 0-9s-6.5-2.5-9 0l-4 4-4-4z"
        fill="none" stroke="url(#pulse)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"
        transform="translate(6, -2) scale(0.7)"/>
  <!-- ECG/Pulse line across the middle -->
  <polyline
    points="8,35 18,35 22,35 25,35 28,22 31,46 34,28 37,38 40,35 44,35 56,35"
    stroke="url(#pulse)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small plus/cross (adviser aspect) -->
  <line x1="48" y1="46" x2="48" y2="56" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="43" y1="51" x2="53" y2="51" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
</svg>
